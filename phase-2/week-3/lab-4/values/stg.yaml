replicaCount: 2
containerPort: 3000
image:
  repository: ghcr.io/chiendz11/demo-app
  tag: "v1.2.0"
  pullPolicy: IfNotPresent

config:
  enabled: true
  data:
    NAME: stg
    APP_ENV: staging
    LOG_LEVEL: info
    FEATURE_GREETING: "true"

secret:
  enabled: true
  stringData:
    API_KEY: stg-demo-api-key
    DB_PASSWORD: stg-demo-password

projectedConfig:
  enabled: true
  mountPath: /etc/demo-app/config

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 20m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

vpa:
  enabled: true
  updateMode: "Off"
  controlledResources:
    - cpu
    - memory
  controlledValues: RequestsOnly
  minAllowed:
    cpu: 20m
    memory: 32Mi
  maxAllowed:
    cpu: 500m
    memory: 512Mi
