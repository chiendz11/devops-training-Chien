replicaCount: 1
containerPort: 3000
image:
  repository: ghcr.io/chiendz11/demo-app
  tag: "v1.1.0"
  pullPolicy: IfNotPresent

config:
  enabled: true
  data:
    NAME: dev
    APP_ENV: development
    LOG_LEVEL: debug
    FEATURE_GREETING: "true"

secret:
  enabled: true
  stringData:
    API_KEY: dev-demo-api-key
    DB_PASSWORD: dev-demo-password

projectedConfig:
  enabled: true
  mountPath: /etc/demo-app/config

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 64Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 20
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60

vpa:
  enabled: true
  updateMode: "Off"
  controlledResources:
    - cpu
    - memory
  controlledValues: RequestsOnly
  minAllowed:
    cpu: 10m
    memory: 16Mi
  maxAllowed:
    cpu: 300m
    memory: 256Mi
