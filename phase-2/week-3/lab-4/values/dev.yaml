replicaCount: 1
containerPort: 3000
image:
  repository: ghcr.io/chiendz11/demo-app
  tag: "v1.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 100m
    memory: 64Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 20
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60

vpa:
  enabled: true
  updateMode: "Off"
  controlledResources:
    - cpu
    - memory
  controlledValues: RequestsOnly
  minAllowed:
    cpu: 10m
    memory: 16Mi
  maxAllowed:
    cpu: 300m
    memory: 256Mi
