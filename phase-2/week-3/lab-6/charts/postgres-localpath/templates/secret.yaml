apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgres-localpath.secretName" . }}
  labels:
    {{- include "postgres-localpath.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ required "postgres.password is required. Use -f postgres-values.secret.yaml or --set postgres.password=..." .Values.postgres.password | quote }}
