deploymentMode: SingleBinary

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: local-path
    accessModes:
      - ReadWriteOnce
    size: 2Gi

gateway:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

test:
  enabled: false
